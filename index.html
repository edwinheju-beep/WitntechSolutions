<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wintech Solutions</title>
<link rel="icon" href="logo.png">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f9fafb;
color:#111827;
display:flex;
justify-content:center;
}

.container{
max-width:900px;
width:100%;
padding:30px 20px;
}

/* APP HEADER */
.app-header{
display:flex;
align-items:center;
gap:15px;
}

.app-header img{
width:70px;
height:70px;
border-radius:16px;
}

.app-info h1{
margin:0;
font-size:22px;
}

.app-info p{
margin:5px 0 0;
color:#6b7280;
font-size:14px;
}

/* BOTÓN */
.btn{
margin-top:20px;
background:#2563eb;
color:white;
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:14px;
}

/* CARGA */
.loader{
margin-top:20px;
display:none;
justify-content:center;
}

.loader img{
width:80px;
animation:spin 1.2s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

/* VIDEO */
.video{
margin-top:30px;
}

.video video{
width:100%;
border-radius:12px;
border:1px solid #e5e7eb;
}

/* FEATURES */
.features{
margin-top:30px;
display:grid;
gap:15px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
border:1px solid #e5e7eb;
}

/* DESKTOP */
@media(min-width:700px){

.app-header{
align-items:flex-start;
}

.video{
margin-top:40px;
}

.features{
grid-template-columns:repeat(2,1fr);
}

}
</style>
</head>

<body>

<div class="container">

<div class="app-header">
<img src="logo.png">
<div class="app-info">
<h1>Wintech Solutions</h1>
<p>Sistema de gestión de inventario</p>
</div>
</div>

<button class="btn" onclick="descargar()">Descargar</button>

<div class="loader" id="loader">
<img src="logo.png">
</div>

<div class="video">
<video controls>
<source src="promo.mp4" type="video/mp4">
</video>
</div>

<div class="features">

<div class="card">
<strong>Usuarios</strong>
<p>Gestión de accesos y permisos</p>
</div>

<div class="card">
<strong>Inventario</strong>
<p>Control de stock en tiempo real</p>
</div>

<div class="card">
<strong>Ventas</strong>
<p>Corrección de transacciones</p>
</div>

<div class="card">
<strong>Multiusuario</strong>
<p>Uso simultáneo sin conflictos</p>
</div>

<div class="card">
<strong>Productos</strong>
<p>Gestión del catálogo</p>
</div>

<div class="card">
<strong>Estabilidad</strong>
<p>Sistema confiable</p>
</div>

</div>

</div>

<script>
function descargar(){
document.getElementById("loader").style.display="flex";

setTimeout(()=>{
window.location.href="https://github.com/edwinheju-beep/WitntechSolutions/releases/download/v1.0/wintech-solutions.apk";
},2000);
}
</script>

</body>
</html>
